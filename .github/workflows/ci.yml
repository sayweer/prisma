name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Soroban contracts — cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  web:
    name: Frontend — vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # npm install (not `npm ci`): the lockfile is generated on Windows, and a Linux
      # runner needs its own platform-specific optional deps (esbuild/rollup/etc).
      - name: Install, test & build
        working-directory: web
        run: |
          npm install
          npm test
          npm run build

  packages:
    name: Packages — x402 + prover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: x402 — bounded gate tests
        working-directory: packages/x402
        run: |
          npm install
          npm test
      - name: prover — CSPRNG salt tests
        working-directory: packages/prover
        run: |
          npm install
          npm test
